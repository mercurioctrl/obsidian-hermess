<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#444"/>
    </marker>
    <marker id="arrL" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="7,0 0,3.5 7,7" fill="#444"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="880" height="490" fill="#f9f6f0"/>

  <!-- Título -->
  <text x="440" y="30" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="14" font-weight="bold" fill="#2c1810">
    MESADA PARAÍSO — VISTA SUPERIOR (PLANTA)
  </text>
  <text x="440" y="48" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#888">
    160 × 65 cm · espesor 4 cm · traforo 55 × 35 cm · escala 1:25
  </text>

  <!-- ═══════════ MESADA ═══════════ -->
  <!-- x=100, y=65, w=640, h=260  (4 px/cm) -->
  <rect x="100" y="65" width="640" height="260"
        fill="#c8a05a" stroke="#6b3f1e" stroke-width="3" rx="3"/>

  <!-- veta de madera -->
  <line x1="100" y1="97"  x2="740" y2="97"  stroke="#b8904a" stroke-width="0.8" opacity="0.45"/>
  <line x1="100" y1="129" x2="740" y2="129" stroke="#b8904a" stroke-width="0.8" opacity="0.45"/>
  <line x1="100" y1="161" x2="740" y2="161" stroke="#b8904a" stroke-width="0.8" opacity="0.45"/>
  <line x1="100" y1="193" x2="740" y2="193" stroke="#b8904a" stroke-width="0.8" opacity="0.45"/>
  <line x1="100" y1="225" x2="740" y2="225" stroke="#b8904a" stroke-width="0.8" opacity="0.45"/>
  <line x1="100" y1="257" x2="740" y2="257" stroke="#b8904a" stroke-width="0.8" opacity="0.45"/>
  <line x1="100" y1="289" x2="740" y2="289" stroke="#b8904a" stroke-width="0.8" opacity="0.45"/>

  <!-- ═══════════ TRAFORO ═══════════ -->
  <!-- left=204 (26cm), top=129 (16cm fondo), w=220 (55cm), h=140 (35cm) -->
  <rect x="204" y="129" width="220" height="140"
        fill="#f9f6f0" stroke="#6b3f1e" stroke-width="2"
        stroke-dasharray="10,5"/>

  <!-- label traforo -->
  <text x="314" y="192" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="12" font-weight="bold" fill="#2c1810">TRAFORO</text>
  <text x="314" y="208" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" fill="#555">55 × 35 cm</text>

  <!-- cruces en esquinas del traforo -->
  <line x1="198" y1="129" x2="210" y2="129" stroke="#6b3f1e" stroke-width="1.5"/>
  <line x1="204" y1="123" x2="204" y2="135" stroke="#6b3f1e" stroke-width="1.5"/>
  <line x1="418" y1="129" x2="430" y2="129" stroke="#6b3f1e" stroke-width="1.5"/>
  <line x1="424" y1="123" x2="424" y2="135" stroke="#6b3f1e" stroke-width="1.5"/>
  <line x1="198" y1="269" x2="210" y2="269" stroke="#6b3f1e" stroke-width="1.5"/>
  <line x1="204" y1="263" x2="204" y2="275" stroke="#6b3f1e" stroke-width="1.5"/>
  <line x1="418" y1="269" x2="430" y2="269" stroke="#6b3f1e" stroke-width="1.5"/>
  <line x1="424" y1="263" x2="424" y2="275" stroke="#6b3f1e" stroke-width="1.5"/>

  <!-- etiquetas de zona -->
  <text x="590" y="88" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#7a4a22" opacity="0.75">FONDO</text>
  <text x="590" y="315" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#7a4a22" opacity="0.75">FRENTE</text>

  <!-- ═══════════ COTAS HORIZONTALES ═══════════ -->

  <!-- Total 160 cm — y=345 -->
  <line x1="100" y1="345" x2="740" y2="345"
        stroke="#333" stroke-width="1.3"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="100" y1="328" x2="100" y2="352" stroke="#333" stroke-width="1"/>
  <line x1="740" y1="328" x2="740" y2="352" stroke="#333" stroke-width="1"/>
  <rect x="388" y="337" width="68" height="16" fill="#f9f6f0"/>
  <text x="422" y="350" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="12" font-weight="bold" fill="#111">160 cm</text>

  <!-- 26 cm — y=370 -->
  <line x1="100" y1="370" x2="204" y2="370"
        stroke="#555" stroke-width="1"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="100" y1="363" x2="100" y2="378" stroke="#555" stroke-width="1"/>
  <line x1="204" y1="363" x2="204" y2="378" stroke="#555" stroke-width="1"/>
  <rect x="124" y="362" width="56" height="14" fill="#f9f6f0"/>
  <text x="152" y="374" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#333">26 cm</text>

  <!-- 55 cm — y=370 -->
  <line x1="204" y1="370" x2="424" y2="370"
        stroke="#555" stroke-width="1"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="424" y1="363" x2="424" y2="378" stroke="#555" stroke-width="1"/>
  <rect x="282" y="362" width="56" height="14" fill="#f9f6f0"/>
  <text x="314" y="374" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#333">55 cm</text>

  <!-- 79 cm — y=370 -->
  <line x1="424" y1="370" x2="740" y2="370"
        stroke="#555" stroke-width="1"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="740" y1="363" x2="740" y2="378" stroke="#555" stroke-width="1"/>
  <rect x="552" y="362" width="56" height="14" fill="#f9f6f0"/>
  <text x="582" y="374" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#333">79 cm</text>

  <!-- ═══════════ COTAS VERTICALES ═══════════ -->

  <!-- Total 65 cm — x=758 -->
  <line x1="758" y1="65" x2="758" y2="325"
        stroke="#333" stroke-width="1.3"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="742" y1="65"  x2="765" y2="65"  stroke="#333" stroke-width="1"/>
  <line x1="742" y1="325" x2="765" y2="325" stroke="#333" stroke-width="1"/>
  <rect x="750" y="183" width="16" height="58" fill="#f9f6f0"/>
  <text x="758" y="220" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="12" font-weight="bold" fill="#111"
        transform="rotate(-90, 758, 195)">65 cm</text>

  <!-- fondo 16 cm — x=793 -->
  <line x1="793" y1="65" x2="793" y2="129"
        stroke="#555" stroke-width="1"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="786" y1="65"  x2="800" y2="65"  stroke="#555" stroke-width="1"/>
  <line x1="786" y1="129" x2="800" y2="129" stroke="#555" stroke-width="1"/>
  <text x="812" y="101" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#333"
        transform="rotate(-90, 812, 97)">16 cm</text>

  <!-- traforo alto 35 cm — x=793 -->
  <line x1="793" y1="129" x2="793" y2="269"
        stroke="#555" stroke-width="1"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="786" y1="269" x2="800" y2="269" stroke="#555" stroke-width="1"/>
  <text x="812" y="203" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#333"
        transform="rotate(-90, 812, 199)">35 cm</text>

  <!-- frente 14 cm — x=793 -->
  <line x1="793" y1="269" x2="793" y2="325"
        stroke="#555" stroke-width="1"
        marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <line x1="786" y1="325" x2="800" y2="325" stroke="#555" stroke-width="1"/>
  <text x="812" y="299" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10" fill="#333"
        transform="rotate(-90, 812, 297)">14 cm</text>

  <!-- ═══════════ FLECHA FRENTE ═══════════ -->
  <line x1="420" y1="450" x2="420" y2="408"
        stroke="#6b3f1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="420" y="466" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="12" font-weight="bold" fill="#6b3f1e">FRENTE — lado del usuario</text>

</svg>
